<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Ethan'Zer — La quête du héros. Application mobile pour animer votre EVG avec défis, votes et boosters." />
  <meta name="theme-color" content="#080814" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ethan'Zer — La quête du héros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <!-- Calcul de la vraie hauteur visible (exclut barre navigateur Android/iOS) -->
  <script>
    /* Fallback uniquement pour les navigateurs qui ne supportent pas 100dvh.
       Sur les navigateurs modernes, le CSS `100dvh` gère tout automatiquement. */
    (function () {
      // Détection du support de dvh
      if (CSS && CSS.supports && CSS.supports('height', '100dvh')) return;
      function setH() {
        var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
        document.documentElement.style.setProperty('--app-h', h + 'px');
      }
      setH();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setH);
      }
      window.addEventListener('resize', setH);
      window.addEventListener('orientationchange', function () { setTimeout(setH, 300); });
    })();
  </script>
  <!-- Firebase compat SDK (no build step required) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
